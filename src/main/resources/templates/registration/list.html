<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layout/main">
<head>
    <meta charset="UTF-8">
    <title>报名管理</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <th:block layout:fragment="page-title">报名管理</th:block>
    <th:block layout:fragment="breadcrumb">报名管理</th:block>

    <div layout:fragment="content">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/registration/list}" method="post" class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold text-muted">报名项目</label>
                        <select class="form-select" id="select-event" name="eventId">
                            <option value="">全部</option>
                            <option th:each="event : ${events}" th:value="${event.id}" th:text="${event.name}">100米短跑</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label small fw-semibold text-muted">关键词搜索</label>
                        <input type="text" class="form-control" id="input-search" name="keyword" th:value="${keyword}" placeholder="输入学号或姓名搜索...">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" id="btn-search" type="submit">
                            <i class="fa-solid fa-magnifying-glass me-1"></i>搜索
                        </button>
                    </div>
                    <div class="col-md-2">
                        <a th:href="@{/registration/add}" class="btn btn-primary w-100" id="btn-register">
                            <i class="fa-solid fa-plus me-1"></i>新增报名
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-bottom-0 py-3 d-flex align-items-center">
                <h5 class="card-title mb-0 fw-bold">
                    <i class="fa-solid fa-list-ul text-primary me-2"></i>报名列表
                </h5>
                <span class="badge bg-primary bg-opacity-10 text-primary ms-2" th:text="${#lists.isEmpty(registrations) ? '0' : #lists.size(registrations)} + ' 条报名'">0 条报名</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">#</th>
                                <th>运动员姓名</th>
                                <th>学号</th>
                                <th>所属院系</th>
                                <th>报名项目</th>
                                <th>报名时间</th>
                                <th>状态</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="reg, iterStat : ${registrations}" th:data-id="${reg.id}" th:if="${not #lists.isEmpty(registrations)}">
                                <td class="ps-4 text-muted" th:text="${iterStat.index + 1}">1</td>
                                <td class="fw-semibold" th:text="${reg.athleteName}">张三</td>
                                <td th:text="${reg.athleteStudentNo}">2024001</td>
                                <td th:text="${reg.deptName}">计算机学院</td>
                                <td th:text="${reg.eventName}">100米短跑</td>
                                <td th:text="${#temporals.format(reg.registerTime, 'yyyy-MM-dd HH:mm')}">2026-07-01 09:00</td>
                                <td>
                                    <span class="badge rounded-pill" th:classappend="${reg.status == 0} ? 'bg-warning text-dark' : (${reg.status == 1} ? 'bg-primary' : 'bg-success')" th:text="${reg.status == 0} ? '已报名' : (${reg.status == 1} ? '已参赛' : '已完赛')">已报名</span>
                                </td>
                                <td class="text-center">
                                    <form th:if="${reg.status == 0}" th:action="@{/registration/cancel}" method="post" class="d-inline" onsubmit="return confirm('确定要取消该报名吗？此操作不可恢复。')">
                                        <input type="hidden" name="id" th:value="${reg.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" id="btn-cancel">
                                            <i class="fa-solid fa-ban"></i> 取消报名
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:unless="${not #lists.isEmpty(registrations)}">
                                <td colspan="8" class="text-center text-muted py-5">
                                    <i class="fa-solid fa-inbox fa-3x d-block mb-3"></i>暂无报名数据
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
