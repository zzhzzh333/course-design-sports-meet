<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 高校运动会管理系统</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" th:href="@{/img/logo.svg}" type="image/svg+xml">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <img th:src="@{/img/logo.svg}" alt="Logo" class="login-logo mb-3" width="64" height="64">
                    <h3 class="fw-bold">高校运动会管理系统</h3>
                    <p class="text-muted">请登录您的账号</p>
                </div>
                <div th:if="${error}" class="alert alert-danger" id="alert-message" role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                </div>
                <div th:if="${msg}" class="alert alert-success" id="alert-message" role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${msg}"></span>
                </div>
                <form method="post" th:action="@{/login}">
                    <div class="mb-3">
                        <label for="input-username" class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="input-username" name="username" placeholder="请输入用户名" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="input-password" class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="input-password" name="password" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2" id="login-btn">
                        <i class="fas fa-sign-in-alt me-2"></i>登 录
                    </button>
                </form>
                <p class="text-center text-muted mt-4 mb-0 small">默认账号: admin / 123456</p>
            </div>
        </div>
    </div>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
