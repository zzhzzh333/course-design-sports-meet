<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layout/main">
<head>
    <meta charset="UTF-8">
    <title>成绩录入 - 表单</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <th:block layout:fragment="page-title">成绩录入</th:block>
    <th:block layout:fragment="breadcrumb">成绩录入 / <span th:text="${event.name}">项目名称</span></th:block>

    <div layout:fragment="content">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white border-bottom-0 py-3 d-flex align-items-center">
                <h5 class="card-title mb-0 fw-bold">
                    <i class="fa-solid fa-circle-info text-primary me-2"></i>项目信息
                </h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <span class="text-muted small">项目名称</span>
                        <p class="fw-semibold mb-0" th:text="${event.name}">100米短跑</p>
                    </div>
                    <div class="col-md-3">
                        <span class="text-muted small">类别</span>
                        <p class="mb-0">
                            <span class="badge bg-primary bg-opacity-10 text-primary" th:text="${event.category}">男子</span>
                        </p>
                    </div>
                    <div class="col-md-3">
                        <span class="text-muted small">比赛日期</span>
                        <p class="mb-0" th:text="${#temporals.format(event.eventDate, 'yyyy-MM-dd')}">2026-07-01</p>
                    </div>
                    <div class="col-md-3">
                        <span class="text-muted small">取前N名</span>
                        <p class="mb-0">
                            <span class="badge bg-warning text-dark" th:text="'前' + ${event.topN} + '名'">前3名</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-bottom-0 py-3 d-flex align-items-center">
                <h5 class="card-title mb-0 fw-bold">
                    <i class="fa-solid fa-list-check text-primary me-2"></i>成绩录入表单
                </h5>
                <span class="badge bg-primary bg-opacity-10 text-primary ms-2" th:text="${#lists.size(registrations)} + ' 名运动员'">0 名运动员</span>
            </div>
            <div class="card-body p-0">
                <form th:action="@{/score/submit}" method="post" id="form-score">
                    <input type="hidden" name="eventId" th:value="${event.id}">

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4" style="width: 60px;">序号</th>
                                    <th>姓名</th>
                                    <th>院系</th>
                                    <th style="width: 140px;">名次</th>
                                    <th style="width: 200px;">成绩</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="reg, iterStat : ${registrations}" th:if="${not #lists.isEmpty(registrations)}">
                                    <td class="ps-4 text-muted" th:text="${iterStat.index + 1}">1</td>
                                    <td class="fw-semibold" th:text="${reg.athleteName}">张三</td>
                                    <td th:text="${reg.deptName}">计算机学院</td>
                                    <td>
                                        <input type="number" class="form-control form-control-sm" th:id="'input-rank-' + ${reg.athleteId}" name="ranks" min="1" placeholder="名次">
                                    </td>
                                    <td>
                                        <input type="text" class="form-control form-control-sm" th:id="'input-result-' + ${reg.athleteId}" name="results" placeholder="如: 12.35">
                                    </td>
                                    <input type="hidden" name="athleteIds" th:value="${reg.athleteId}">
                                    <input type="hidden" name="registrationIds" th:value="${reg.id}">
                                </tr>
                                <tr th:unless="${not #lists.isEmpty(registrations)}">
                                    <td colspan="5" class="text-center text-muted py-5">
                                        <i class="fa-solid fa-inbox fa-3x d-block mb-3"></i>该项目暂无报名运动员
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="card-footer bg-white border-top-0 py-3 d-flex justify-content-between" th:if="${not #lists.isEmpty(registrations)}">
                        <a th:href="@{/score/input}" class="btn btn-outline-secondary">
                            <i class="fa-solid fa-arrow-left me-1"></i>取消
                        </a>
                        <button type="submit" class="btn btn-primary" id="btn-submit-results">
                            <i class="fa-solid fa-paper-plane me-1"></i>提交成绩
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/app.js}"></script>
    <script>
        document.getElementById('form-score').addEventListener('submit', function(e) {
            var hasRank = false;
            var ranks = document.getElementsByName('ranks');
            for (var i = 0; i < ranks.length; i++) {
                if (ranks[i].value) {
                    hasRank = true;
                    break;
                }
            }
            if (!hasRank) {
                if (!confirm('未填写任何名次，确定提交吗？')) {
                    e.preventDefault();
                }
            }
        });
    </script>
</body>
</html>
