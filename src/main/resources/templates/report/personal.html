<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layout/main">
<head>
    <meta charset="UTF-8">
    <title>个人成绩查询</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <th:block layout:fragment="page-title">个人成绩查询</th:block>
    <th:block layout:fragment="breadcrumb">统计报表 / 个人成绩查询</th:block>

    <div layout:fragment="content">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/report/personal}" method="post" class="row g-3 align-items-end">
                    <div class="col-md-8">
                        <label class="form-label small fw-semibold text-muted">关键词搜索</label>
                        <input type="text" class="form-control" id="input-search" name="keyword"
                               placeholder="输入学号或姓名搜索运动员成绩..."
                               th:value="${keyword}">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100" id="btn-search">
                            <i class="fa-solid fa-magnifying-glass me-1"></i>搜索
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <th:block th:if="${keyword != null and not #strings.isEmpty(keyword)}">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom-0 py-3 d-flex align-items-center">
                    <h5 class="card-title mb-0 fw-bold">
                        <i class="fa-solid fa-list-ul text-primary me-2"></i>查询结果
                    </h5>
                    <span class="badge bg-primary bg-opacity-10 text-primary ms-2" th:text="${#lists.isEmpty(scores) ? '0' : #lists.size(scores)} + ' 条成绩'">0 条成绩</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" th:if="${not #lists.isEmpty(scores)}">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">项目名称</th>
                                    <th>类别</th>
                                    <th>名次</th>
                                    <th>成绩</th>
                                    <th>得分</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="score, iterStat : ${scores}">
                                    <td class="ps-4 fw-semibold" th:text="${score.eventName}">100米短跑</td>
                                    <td>
                                        <span class="badge bg-primary bg-opacity-10 text-primary" th:text="${score.eventCategory}">男子</span>
                                    </td>
                                    <td>
                                        <span th:if="${score.rank == 1}" class="badge bg-warning text-dark fs-6">
                                            <i class="fa-solid fa-medal"></i> 1
                                        </span>
                                        <span th:if="${score.rank == 2}" class="badge bg-secondary fs-6">
                                            <i class="fa-solid fa-medal"></i> 2
                                        </span>
                                        <span th:if="${score.rank == 3}" class="badge bg-warning bg-opacity-50 text-dark fs-6">
                                            <i class="fa-solid fa-medal"></i> 3
                                        </span>
                                        <span th:if="${score.rank != null and score.rank > 3}" class="fw-semibold text-muted" th:text="${score.rank}">4</span>
                                        <span th:if="${score.rank == null}" class="text-muted">-</span>
                                    </td>
                                    <td th:text="${score.result != null ? score.result : '-'}">12.35</td>
                                    <td>
                                        <span th:if="${score.points != null}" class="fw-bold text-primary" th:text="${score.points}">5</span>
                                        <span th:if="${score.points == null}" class="text-muted">-</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <div th:unless="${not #lists.isEmpty(scores)}" class="text-center text-muted py-5">
                            <i class="fa-solid fa-inbox fa-3x d-block mb-3"></i>暂无相关成绩数据
                        </div>
                    </div>
                </div>
            </div>
        </th:block>
    </div>


</body>
</html>
