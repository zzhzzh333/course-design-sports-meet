<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">高校运动会管理系统</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" th:href="@{/img/logo.svg}" type="image/svg+xml">
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/dashboard" class="text-decoration-none text-white">
                    <i class="fas fa-medal me-2"></i>
                    <span class="sidebar-text">运动会管理</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <a th:href="@{/dashboard}" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i>
                    <span class="sidebar-text">仪表板</span>
                </a>
                <a th:href="@{/event/list}" class="nav-item">
                    <i class="fas fa-trophy"></i>
                    <span class="sidebar-text">比赛项目管理</span>
                </a>
                <a th:href="@{/athlete/list}" class="nav-item">
                    <i class="fas fa-running"></i>
                    <span class="sidebar-text">运动员管理</span>
                </a>
                <a th:href="@{/registration/list}" class="nav-item">
                    <i class="fas fa-clipboard-list"></i>
                    <span class="sidebar-text">报名管理</span>
                </a>
                <a th:href="@{/score/input}" class="nav-item">
                    <i class="fas fa-edit"></i>
                    <span class="sidebar-text">成绩录入</span>
                </a>
                <a th:href="@{/report/team}" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span class="sidebar-text">统计报表</span>
                </a>
            </nav>
        </aside>
        <div class="main-area">
            <header class="topbar">
                <button class="btn btn-link text-white sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="ms-auto d-flex align-items-center">
                    <div class="dropdown">
                        <button class="btn btn-link text-white dropdown-toggle text-decoration-none" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle me-1"></i>
                            <span th:text="${session.loginUser?.realName}">管理员</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/logout}"><i class="fas fa-sign-out-alt me-2"></i>退出登录</a></li>
                        </ul>
                    </div>
                </div>
            </header>
            <main class="content fade-in" id="mainContent">
                <div class="page-header">
                    <h4 class="page-title" layout:fragment="page-title">页面标题</h4>
                    <nav class="breadcrumb-nav">
                        <a href="/dashboard">首页</a>
                        <span class="separator">/</span>
                        <span layout:fragment="breadcrumb">当前页面</span>
                    </nav>
                </div>
                <div th:if="${msg}" class="alert alert-success alert-dismissible fade show" id="alert-message" role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${msg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" id="alert-message" role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div layout:fragment="content"></div>
            </main>
            <footer class="footer">
                <span>&copy; 2026 高校运动会管理系统</span>
            </footer>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
