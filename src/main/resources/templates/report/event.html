<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layout/main">
<head>
    <meta charset="UTF-8">
    <title>项目成绩查询</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <th:block layout:fragment="page-title">项目成绩查询</th:block>
    <th:block layout:fragment="breadcrumb">统计报表 / 项目成绩查询</th:block>

    <div layout:fragment="content">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/report/event}" method="post" class="row g-3 align-items-end">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold text-muted">选择比赛项目</label>
                        <select class="form-select" id="select-event" name="eventId">
                            <option value="">-- 请选择项目 --</option>
                            <option th:each="event : ${events}"
                                    th:value="${event.id}"
                                    th:text="${event.name} + ' (' + ${event.category} + ')'"
                                    th:selected="${event.id == eventId}">100米短跑 (男子)</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100" id="btn-search">
                            <i class="fa-solid fa-magnifying-glass me-1"></i>查询
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <th:block th:if="${eventId != null}">
            <div class="card border-0 shadow-sm mb-4" th:if="${event != null}">
                <div class="card-header bg-white border-bottom-0 py-3 d-flex align-items-center">
                    <h5 class="card-title mb-0 fw-bold">
                        <i class="fa-solid fa-circle-info text-primary me-2"></i>项目信息
                    </h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <span class="text-muted small">项目名称</span>
                            <p class="fw-semibold mb-0" th:text="${event.name}">100米短跑</p>
                        </div>
                        <div class="col-md-4">
                            <span class="text-muted small">类别</span>
                            <p class="mb-0">
                                <span class="badge bg-primary bg-opacity-10 text-primary" th:text="${event.category}">男子</span>
                            </p>
                        </div>
                        <div class="col-md-4">
                            <span class="text-muted small">比赛日期</span>
                            <p class="mb-0" th:text="${#temporals.format(event.eventDate, 'yyyy-MM-dd')}">2026-07-01</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom-0 py-3 d-flex align-items-center">
                    <h5 class="card-title mb-0 fw-bold">
                        <i class="fa-solid fa-trophy text-primary me-2"></i>成绩列表
                    </h5>
                    <span class="badge bg-primary bg-opacity-10 text-primary ms-2" th:text="${#lists.isEmpty(scores) ? '0' : #lists.size(scores)} + ' 条成绩'">0 条成绩</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" th:if="${not #lists.isEmpty(scores)}">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4" style="width: 80px;">名次</th>
                                    <th>姓名</th>
                                    <th>院系</th>
                                    <th>成绩</th>
                                    <th style="width: 100px;">得分</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="score, iterStat : ${scores}">
                                    <td class="ps-4">
                                        <span th:if="${score.rank == 1}" class="badge bg-warning text-dark fs-6">
                                            <i class="fa-solid fa-medal"></i> 1
                                        </span>
                                        <span th:if="${score.rank == 2}" class="badge bg-secondary fs-6">
                                            <i class="fa-solid fa-medal"></i> 2
                                        </span>
                                        <span th:if="${score.rank == 3}" class="badge bg-warning bg-opacity-50 text-dark fs-6">
                                            <i class="fa-solid fa-medal"></i> 3
                                        </span>
                                        <span th:if="${score.rank != null and score.rank > 3}" class="fw-semibold text-muted" th:text="${score.rank}">4</span>
                                        <span th:if="${score.rank == null}" class="text-muted">-</span>
                                    </td>
                                    <td class="fw-semibold" th:text="${score.athleteName}">张三</td>
                                    <td th:text="${score.deptName}">计算机学院</td>
                                    <td th:text="${score.result != null ? score.result : '-'}">12.35</td>
                                    <td>
                                        <span th:if="${score.points != null}" class="fw-bold text-primary" th:text="${score.points}">5</span>
                                        <span th:if="${score.points == null}" class="text-muted">-</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <div th:unless="${not #lists.isEmpty(scores)}" class="text-center text-muted py-5">
                            <i class="fa-solid fa-inbox fa-3x d-block mb-3"></i>暂无成绩数据
                        </div>
                    </div>
                </div>
            </div>
        </th:block>
    </div>


</body>
</html>
